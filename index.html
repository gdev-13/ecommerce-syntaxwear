<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SyntaxWear - Tênis e Sneackers Online</title>

  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/layout.css">
  <link rel="stylesheet" href="./css/reset.css">
  <link rel="stylesheet" href="./css/variables.css">
  <link rel="stylesheet" href="./css/components/header.css">
  <link rel="stylesheet" href="./css/components/hero.css">
  <link rel="stylesheet" href="./css/components/product-card.css">
  <link rel="stylesheet" href="./css/components/product-grid.css">

<body>
  <header class="header">
    <h1 class="logo">
      <a href="/" title="SyntaxWear - Tênis e Sneackers Online">
        <img src="./images/logo/logo.svg" alt="SyntaxWear - Tênis e Sneackers Online">
      </a>
    </h1>

    <nav class="nav-center" aria-label="Categorias Principais">
      <ul>
        <li><a href="#">Masculino</a></li>
        <li><a href="#">Feminino</a></li>
        <li><a href="#">Outlet</a></li>
      </ul>
    </nav>

    <nav class="nav-right" aria-label="Ações do Usuário">
      <ul>
        <li><a href="#">Nossas Lojas</a></li>
        <li><a href="#">Conta</a></li>
        <li>
          <a href="#" aria-label="Minha Conta">
            <img src="./images/icons/user.svg" alt="Minha Conta">
          </a>
        </li>
        <li>
          <a href="#" aria-label="Ajuda">
            <img src="./images/icons/help.svg" alt="Ajuda">
          </a>

          <a href="#" aria-label="Carrinho de Compras">

          </a>
        </li>
      </ul>
  </header>
  <main>
    <section class="hero-section">
      <div class="hero-overlay">
        <div class="hero-content">
          <span class="hero-subtitle">Krypto One</span>
          <h2 class="hero-title">Transforme qualquer passo em presença.</h2>
          <div class="hero-buttons">
            <a href="#" class="btn btn-outline">Ver Modelos</a>
            <a href="#" class="btn btn-filled">Comprar</a>
          </div>
        </div>
      </div>
    </section>
    <section class="category-section">
      <div class="category-card casual">
        <a href="#" class="category-link">
          <span class="overlay"></span>
          <span class="category-name btn btn-outline">Casual</span>
        </a>
      </div>
      <div class="category-card esportivo">
        <a href="#" class="category-link">
          <span class="overlay"></span>
          <span class="category-name btn btn-outline">Esportivo</span>
        </a>
      </div>
      <div class="category-card moderno">
        <a href="#" class="category-link">
          <span class="overlay"></span>
          <span class="category-name btn btn-outline">Moderno</span>
        </a>
      </div>
      <div class="category-card futurista">
        <a href="#" class="category-link">
          <span class="overlay"></span>
          <span class="category-name btn btn-outline">Futurista</span>
        </a>
      </div>
    </section>
    <section class="featured-products-section">
      <div class="card top1">
        <div class="top1-content">
          <h3 class="card-title">Krypto One</h3>
          <p class="card-subtitle">Estilo urbano com atitude.</p>
          <div class="cta-group">
            <a href="#" class="btn btn-outline">Feminino</a>
            <a href="#" class="btn btn-outline">Masculino</a>
          </div>
        </div>
      </div>
      <div class="card top2"></div>
      <div class="card midL"></div>
      <div class="card midR"></div>
      <div class="card bottomL"></div>
      <div class="card bottomR"></div>
    </section>
  </main>
  <footer class="site-footer">
  </footer>

</html>
